<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="1200" height="450">
  <defs>
    <linearGradient id="cv-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9E4C0"/>
      <stop offset="45%" stop-color="#EDB97A"/>
      <stop offset="100%" stop-color="#D6946A"/>
    </linearGradient>
    <linearGradient id="cv-hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7C3B"/>
      <stop offset="100%" stop-color="#4A5438"/>
    </linearGradient>
    <linearGradient id="cv-hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5E6B4A"/>
      <stop offset="100%" stop-color="#3A4228"/>
    </linearGradient>
    <linearGradient id="cv-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="100%" stop-color="#8B6840"/>
    </linearGradient>
    <radialGradient id="cv-sun" cx="30%" cy="28%" r="18%">
      <stop offset="0%" stop-color="#FFE4A0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#EDB97A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="450" fill="url(#cv-sky)"/>

  <!-- Sun glow -->
  <ellipse cx="360" cy="125" rx="200" ry="130" fill="url(#cv-sun)"/>
  <circle cx="360" cy="95" r="28" fill="#FFE4A0" opacity="0.5"/>
  <circle cx="360" cy="95" r="16" fill="#FFD060" opacity="0.55"/>

  <!-- Distant hills - far background -->
  <path d="M0,280 Q120,240 240,255 Q360,265 480,235 Q600,210 720,230 Q840,248 960,225 Q1080,205 1200,235 L1200,450 L0,450 Z" fill="url(#cv-hill2)" opacity="0.55"/>

  <!-- Middle hills -->
  <path d="M0,310 Q80,285 200,295 Q320,308 440,280 Q560,255 680,270 Q800,288 920,265 Q1040,245 1200,275 L1200,450 L0,450 Z" fill="url(#cv-hill)" opacity="0.7"/>

  <!-- Village buildings on hillside - left cluster -->
  <rect x="80"  y="268" width="22" height="38" fill="#C86A43" rx="1"/>
  <polygon points="80,268 91,252 102,268" fill="#A0522D"/>
  <rect x="108" y="274" width="18" height="32" fill="#D4956A" rx="1"/>
  <polygon points="108,274 117,260 126,274" fill="#B8602D"/>
  <rect x="130" y="265" width="26" height="41" fill="#C86A43" rx="1"/>
  <polygon points="130,265 143,246 156,265" fill="#9A4F2B"/>
  <rect x="160" y="272" width="16" height="34" fill="#D4956A" rx="1"/>

  <!-- Village buildings - center cluster (on hill) -->
  <rect x="480" y="235" width="20" height="36" fill="#C86A43" rx="1"/>
  <polygon points="480,235 490,218 500,235" fill="#A0522D"/>
  <rect x="504" y="241" width="24" height="30" fill="#D4956A" rx="1"/>
  <polygon points="504,241 516,224 528,241" fill="#B8602D"/>
  <!-- Church tower -->
  <rect x="530" y="220" width="14" height="52" fill="#E8D4B0" rx="1"/>
  <polygon points="530,220 537,205 544,220" fill="#C4A882"/>
  <rect x="534" y="225" width="6" height="8" fill="#5E6B4A" opacity="0.6"/>
  <rect x="548" y="238" width="20" height="34" fill="#C86A43" rx="1"/>

  <!-- Village buildings - right cluster -->
  <rect x="950"  y="255" width="24" height="40" fill="#C86A43" rx="1"/>
  <polygon points="950,255 962,237 974,255" fill="#A0522D"/>
  <rect x="978" y="260" width="18" height="35" fill="#D4956A" rx="1"/>
  <rect x="1000" y="250" width="28" height="45" fill="#C86A43" rx="1"/>
  <polygon points="1000,250 1014,230 1028,250" fill="#9A4F2B"/>
  <rect x="1032" y="258" width="16" height="37" fill="#D4956A" rx="1"/>

  <!-- Olive tree left -->
  <rect x="265" y="315" width="6" height="70" fill="#8B6040" rx="2"/>
  <ellipse cx="268" cy="305" rx="28" ry="22" fill="#5E6B4A" opacity="0.85"/>
  <ellipse cx="256" cy="312" rx="18" ry="15" fill="#6B7C3B" opacity="0.75"/>
  <ellipse cx="282" cy="310" rx="16" ry="13" fill="#4A5438" opacity="0.7"/>

  <!-- Olive tree right -->
  <rect x="900" y="310" width="6" height="65" fill="#8B6040" rx="2"/>
  <ellipse cx="903" cy="300" rx="26" ry="20" fill="#5E6B4A" opacity="0.8"/>
  <ellipse cx="892" cy="308" rx="17" ry="14" fill="#6B7C3B" opacity="0.7"/>
  <ellipse cx="916" cy="306" rx="15" ry="12" fill="#4A5438" opacity="0.65"/>

  <!-- Foreground stone wall -->
  <rect x="0" y="370" width="1200" height="80" fill="url(#cv-ground)"/>
  <!-- Stone texture on wall -->
  <line x1="0" y1="390" x2="1200" y2="390" stroke="#9A7A55" stroke-width="1" opacity="0.35"/>
  <line x1="0" y1="412" x2="1200" y2="412" stroke="#9A7A55" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="432" x2="1200" y2="432" stroke="#9A7A55" stroke-width="1" opacity="0.28"/>
  <line x1="120" y1="370" x2="120" y2="450" stroke="#9A7A55" stroke-width="1" opacity="0.25"/>
  <line x1="280" y1="370" x2="280" y2="450" stroke="#9A7A55" stroke-width="1" opacity="0.22"/>
  <line x1="440" y1="370" x2="440" y2="450" stroke="#9A7A55" stroke-width="1" opacity="0.25"/>
  <line x1="600" y1="370" x2="600" y2="450" stroke="#9A7A55" stroke-width="1" opacity="0.22"/>
  <line x1="760" y1="370" x2="760" y2="450" stroke="#9A7A55" stroke-width="1" opacity="0.25"/>
  <line x1="920" y1="370" x2="920" y2="450" stroke="#9A7A55" stroke-width="1" opacity="0.22"/>
  <line x1="1080" y1="370" x2="1080" y2="450" stroke="#9A7A55" stroke-width="1" opacity="0.25"/>

  <!-- Caption area -->
  <rect x="0" y="392" width="1200" height="58" fill="#2D2A26" opacity="0.68"/>
  <text x="600" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#F9E4C0" letter-spacing="3" opacity="0.92">your story lives here</text>
  <text x="600" y="442" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#D6A94D" letter-spacing="6" opacity="0.78">CULO VILLAGE</text>
</svg>
