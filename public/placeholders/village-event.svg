  <line x1="0" y1="393" x2="1200" y2="393" stroke="#6A4828" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="410" x2="1200" y2="410" stroke="#6A4828" stroke-width="1" opacity="0.38"/>
  <line x1="0" y1="428" x2="1200" y2="428" stroke="#6A4828" stroke-width="1" opacity="0.35"/>
