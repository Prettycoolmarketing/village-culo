  <line x1="960" y1="378" x2="960" y2="450" stroke="#6A4828" stroke-width="1" opacity="0.28"/>
  <line x1="1100" y1="378" x2="1100" y2="450" stroke="#6A4828" stroke-width="1" opacity="0.25"/>

  <!-- Caption -->
  <rect x="0" y="395" width="1200" height="55" fill="#2D2A26" opacity="0.75"/>
  <text x="600" y="422" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#F9E4C0" letter-spacing="3" opacity="0.95">gathering in the piazza</text>
  <text x="600" y="443" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#D6A94D" letter-spacing="6" opacity="0.82">CULO VILLAGE</text>
