<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="1200" height="450">
  <defs>
    <linearGradient id="ev-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D1A08"/>
      <stop offset="35%" stop-color="#7A3818"/>
      <stop offset="65%" stop-color="#C86A43"/>
      <stop offset="100%" stop-color="#D6946A"/>
    </linearGradient>
    <linearGradient id="ev-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6840"/>
      <stop offset="100%" stop-color="#5A4228"/>
    </linearGradient>
    <radialGradient id="ev-glow1" cx="35%" cy="55%" r="25%">
      <stop offset="0%" stop-color="#D6A94D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C86A43" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ev-glow2" cx="68%" cy="60%" r="20%">
      <stop offset="0%" stop-color="#D6A94D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C86A43" stop-opacity="0"/>
    </radialGradient>
  </defs>

