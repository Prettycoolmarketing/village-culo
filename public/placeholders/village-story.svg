<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="st-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9E4C0"/>
      <stop offset="55%" stop-color="#EDB97A"/>
      <stop offset="100%" stop-color="#D6946A"/>
    </linearGradient>
    <linearGradient id="st-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="100%" stop-color="#7A5E42"/>
    </linearGradient>
    <radialGradient id="st-glow" cx="50%" cy="42%" r="22%">
      <stop offset="0%" stop-color="#FFE4A0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#EDB97A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="st-lwall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A3818"/>
      <stop offset="100%" stop-color="#C86A43"/>
    </linearGradient>
    <linearGradient id="st-rwall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C86A43"/>
      <stop offset="100%" stop-color="#7A3818"/>
    </linearGradient>
    <linearGradient id="st-arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4A0"/>
      <stop offset="100%" stop-color="#F5C878"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="800" fill="url(#st-sky)"/>

  <!-- Glow from archway -->
  <ellipse cx="300" cy="340" rx="130" ry="150" fill="url(#st-glow)"/>

  <!-- Left wall -->
  <polygon points="0,0 210,0 248,540 180,800 0,800" fill="url(#st-lwall)"/>

  <!-- Right wall -->
  <polygon points="390,0 600,0 600,800 420,800 352,540" fill="url(#st-rwall)"/>

  <!-- Left wall brick texture -->
  <line x1="0" y1="80"  x2="213" y2="80"  stroke="#6A2E0E" stroke-width="1" opacity="0.18"/>
  <line x1="0" y1="160" x2="219" y2="160" stroke="#6A2E0E" stroke-width="1" opacity="0.18"/>
  <line x1="0" y1="240" x2="226" y2="240" stroke="#6A2E0E" stroke-width="1" opacity="0.16"/>
  <line x1="0" y1="320" x2="232" y2="320" stroke="#6A2E0E" stroke-width="1" opacity="0.16"/>
  <line x1="0" y1="400" x2="238" y2="400" stroke="#6A2E0E" stroke-width="1" opacity="0.14"/>
  <line x1="0" y1="480" x2="244" y2="480" stroke="#6A2E0E" stroke-width="1" opacity="0.14"/>
  <!-- Right wall -->
  <line x1="387" y1="80"  x2="600" y2="80"  stroke="#6A2E0E" stroke-width="1" opacity="0.18"/>
  <line x1="381" y1="160" x2="600" y2="160" stroke="#6A2E0E" stroke-width="1" opacity="0.18"/>
  <line x1="374" y1="240" x2="600" y2="240" stroke="#6A2E0E" stroke-width="1" opacity="0.16"/>
  <line x1="368" y1="320" x2="600" y2="320" stroke="#6A2E0E" stroke-width="1" opacity="0.16"/>
  <line x1="362" y1="400" x2="600" y2="400" stroke="#6A2E0E" stroke-width="1" opacity="0.14"/>

  <!-- Distant center wall -->
  <rect x="238" y="180" width="124" height="300" fill="#D4956A" opacity="0.85"/>

  <!-- Archway frame -->
  <path d="M258,460 L258,350 Q300,295 342,350 L342,460 Z" fill="#3D2010"/>
  <!-- Archway interior glow -->
  <path d="M264,460 L264,355 Q300,305 336,355 L336,460 Z" fill="url(#st-arch)" opacity="0.9"/>

  <!-- Cobblestone ground -->
  <polygon points="180,560 420,560 600,800 0,800" fill="url(#st-ground)"/>

  <!-- Cobble grid lines -->
  <line x1="185" y1="600" x2="415" y2="600" stroke="#8A6A45" stroke-width="1" opacity="0.4"/>
  <line x1="183" y1="645" x2="417" y2="645" stroke="#8A6A45" stroke-width="1" opacity="0.38"/>
  <line x1="180" y1="695" x2="420" y2="695" stroke="#8A6A45" stroke-width="1" opacity="0.35"/>
  <line x1="178" y1="748" x2="422" y2="748" stroke="#8A6A45" stroke-width="1" opacity="0.3"/>
  <line x1="270" y1="568" x2="265" y2="760" stroke="#8A6A45" stroke-width="1" opacity="0.28"/>
  <line x1="300" y1="562" x2="300" y2="765" stroke="#8A6A45" stroke-width="1" opacity="0.28"/>
  <line x1="330" y1="568" x2="335" y2="760" stroke="#8A6A45" stroke-width="1" opacity="0.28"/>

  <!-- Left wall shuttered window -->
  <rect x="48" y="280" width="88" height="110" fill="#F9D4A0" rx="3" opacity="0.75"/>
  <!-- arch top of window -->
  <path d="M48,305 Q92,280 136,305" fill="#F9D4A0" opacity="0.75"/>
  <rect x="48" y="280" width="40" height="110" fill="#5E6B4A" rx="2" opacity="0.78"/>
  <rect x="96" y="280" width="40" height="110" fill="#4A5438" rx="2" opacity="0.82"/>
  <!-- Shutter slats -->
  <line x1="50" y1="305" x2="86" y2="305" stroke="#3A4228" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="325" x2="86" y2="325" stroke="#3A4228" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="345" x2="86" y2="345" stroke="#3A4228" stroke-width="1" opacity="0.4"/>
  <line x1="98" y1="305" x2="134" y2="305" stroke="#3A4228" stroke-width="1" opacity="0.4"/>
  <line x1="98" y1="325" x2="134" y2="325" stroke="#3A4228" stroke-width="1" opacity="0.4"/>
  <line x1="98" y1="345" x2="134" y2="345" stroke="#3A4228" stroke-width="1" opacity="0.4"/>

  <!-- Vine climbing left wall -->
  <path d="M163,180 Q158,230 162,285 Q170,275 164,320 Q172,305 165,360" fill="none" stroke="#5E6B4A" stroke-width="2.5" opacity="0.65"/>
  <ellipse cx="158" cy="195" rx="13" ry="10" fill="#5E6B4A" opacity="0.6" transform="rotate(-25,158,195)"/>
  <ellipse cx="164" cy="245" rx="12" ry="9" fill="#6B7C3B" opacity="0.55" transform="rotate(15,164,245)"/>
  <ellipse cx="160" cy="300" rx="11" ry="9" fill="#5E6B4A" opacity="0.6" transform="rotate(-10,160,300)"/>
  <ellipse cx="165" cy="350" rx="10" ry="8" fill="#6B7C3B" opacity="0.5" transform="rotate(20,165,350)"/>

  <!-- Small terracotta pot at base of wall -->
  <ellipse cx="196" cy="568" rx="14" ry="7" fill="#A0522D" opacity="0.85"/>
  <rect x="182" y="543" width="28" height="25" fill="#C86A43" rx="2" opacity="0.85"/>
  <ellipse cx="196" cy="543" rx="14" ry="5" fill="#D4956A" opacity="0.85"/>
  <!-- Plant in pot -->
  <path d="M196,543 Q190,520 198,500 Q202,515 197,525 Q205,510 210,495 Q207,515 200,528 Z" fill="#5E6B4A" opacity="0.8"/>

  <!-- Right wall small window -->
  <rect x="464" y="310" width="72" height="95" fill="#F9D4A0" rx="3" opacity="0.6"/>
  <rect x="464" y="310" width="33" height="95" fill="#4A5438" rx="2" opacity="0.72"/>
  <rect x="503" y="310" width="33" height="95" fill="#5E6B4A" rx="2" opacity="0.68"/>

  <!-- Small sun/glow hint in sky -->
  <circle cx="300" cy="80" r="30" fill="#FFE4A0" opacity="0.35"/>
  <circle cx="300" cy="80" r="18" fill="#FFD060" opacity="0.45"/>

  <!-- Caption strip -->
  <rect x="0" y="726" width="600" height="74" fill="#2D2A26" opacity="0.75"/>
  <text x="300" y="756" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#F9E4C0" letter-spacing="2.5" opacity="0.95">your story lives here</text>
  <text x="300" y="782" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#D6A94D" letter-spacing="5.5" opacity="0.85">CULO VILLAGE</text>
</svg>
